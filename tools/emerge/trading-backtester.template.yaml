---
project_name: trading-backtester
loglevel: info
analyses:
- analysis_name: backend-python
  source_directory: __ROOT__/backend
  git_directory: __ROOT__
  only_permit_languages:
  - py
  only_permit_file_extensions:
  - .py
  ignore_directories_containing:
  - venv
  - __pycache__
  file_scan:
  - source_lines_of_code
  - dependency_graph
  - fan_in_out
  - louvain_modularity
  - tfidf
  - ws_complexity
  - git_metrics
  export:
  - directory: __ROOT__/reports/emerge/backend
  - graphml
  - json
  - tabular_file
  - tabular_console_overall
  - d3
- analysis_name: data-pipeline-python
